<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blake's Game Shelf</title>
<link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,400;0,700;0,800;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#161210;--bg2:#1c1814;--card:#221e19;
  --tx:#e0d8cc;--txd:rgba(224,216,204,0.4);--txm:rgba(224,216,204,0.6);
  --gold:#c9a24d;--rust:#c75a30;--forest:#5a8a5a;--slate:#8a9aaa;
  --border:rgba(224,216,204,0.1);--bordlt:rgba(224,216,204,0.06);
  --fd:'Bitter',Georgia,serif;--fb:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);font-weight:400;min-height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

.wrap{max-width:1120px;margin:0 auto;padding:0 20px 80px}

header{padding:40px 0 28px;border-bottom:1px solid rgba(224,216,204,0.15);margin-bottom:24px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.hl h1{font-family:var(--fd);font-size:clamp(2rem,5vw,3rem);font-weight:800;line-height:1;letter-spacing:-0.02em}
.hl h1 span{color:var(--gold);font-style:italic}
.hl p{margin-top:6px;color:var(--txd);font-size:0.8rem;letter-spacing:0.05em;text-transform:uppercase}
.badge{background:rgba(224,216,204,0.06);border:1px solid var(--border);font-family:var(--fd);font-size:2rem;font-weight:700;padding:10px 20px;text-align:center;line-height:1;color:var(--gold);border-radius:4px}
.badge small{display:block;font-family:var(--fb);font-size:0.6rem;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;margin-top:4px;color:var(--txd)}

.fbar{background:var(--card);border:1px solid var(--border);padding:14px 16px;margin-bottom:24px;border-radius:4px}
.frow{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.frow+.frow{margin-top:10px;padding-top:10px;border-top:1px solid var(--bordlt)}
.flbl{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--txd);font-weight:600;margin-right:4px;flex-shrink:0}
.si{border:1px solid var(--border);background:rgba(224,216,204,0.05);padding:7px 12px;color:var(--tx);font-size:13px;font-family:var(--fb);width:200px;outline:none;border-radius:3px}
.si:focus{border-color:rgba(201,162,77,0.5)}.si::placeholder{color:var(--txd)}

.pill{padding:5px 12px;border:1px solid var(--border);background:rgba(224,216,204,0.03);font-size:0.72rem;font-family:var(--fb);font-weight:500;cursor:pointer;transition:all 0.12s;white-space:nowrap;color:var(--txd);border-radius:4px}
.pill:hover{border-color:rgba(224,216,204,0.25);color:var(--txm)}
.pill.on{background:rgba(201,162,77,0.2);border-color:rgba(201,162,77,0.4);color:var(--gold)}
.pm-party.on{background:rgba(199,90,48,0.2);border-color:rgba(199,90,48,0.45);color:#e07050}
.pm-euro.on{background:rgba(90,138,90,0.2);border-color:rgba(90,138,90,0.45);color:#7ab07a}
.pm-mid.on{background:rgba(90,120,160,0.2);border-color:rgba(90,120,160,0.45);color:#8ab0d0}
.pm-epic.on{background:rgba(140,80,170,0.2);border-color:rgba(140,80,170,0.45);color:#b88ae0}
.pm-family.on{background:rgba(60,140,80,0.2);border-color:rgba(60,140,80,0.45);color:#60c080}
.pm-solo.on{background:rgba(140,120,60,0.2);border-color:rgba(140,120,60,0.45);color:#c0a850}
.pc{background:none;border:1px solid var(--border);padding:4px 10px;color:var(--txd);font-size:0.68rem;font-family:var(--fb);cursor:pointer;border-radius:4px}
.pc:hover{color:var(--tx);border-color:rgba(224,216,204,0.25)}

.status{font-size:0.78rem;color:var(--txd);margin-bottom:20px;min-height:18px}

.shelf{margin-bottom:32px}
.shelf-hdr{display:flex;align-items:baseline;gap:12px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.shelf-title{font-family:var(--fd);font-size:1.15rem;font-weight:800;color:var(--tx)}
.shelf-count{font-size:0.72rem;color:var(--txd);font-weight:500}
.shelf-desc{font-size:0.75rem;color:var(--txd);font-style:italic;margin-left:auto}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}

.card{background:var(--card);border:1px solid var(--border);padding:12px 12px 12px 16px;display:flex;gap:12px;align-items:flex-start;cursor:pointer;position:relative;overflow:hidden;transition:transform 0.12s,box-shadow 0.12s,border-color 0.12s;border-radius:4px}
.card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px}
.card:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,0.4);border-color:rgba(224,216,204,0.15)}
.card.cmp{box-shadow:0 0 0 2px var(--slate);border-color:transparent}
.card[data-wc="5"]::before{background:var(--rust)}
.card[data-wc="4"]::before{background:var(--gold)}
.card[data-wc="3"]::before{background:var(--forest)}
.card[data-wc="2"]::before{background:#5a9e7a}
.card[data-wc="1"]::before{background:#9e9a5e}

.card-thumb{flex-shrink:0;width:56px;height:56px;overflow:hidden;border-radius:3px;position:relative;background:rgba(224,216,204,0.06)}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity 0.3s}
.card-thumb img.ld{opacity:1}
.card-thumb .av{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;position:absolute;inset:0;pointer-events:none;transition:opacity 0.3s}
.card-thumb:has(img.ld) .av{opacity:0}

.card-body{flex:1;min-width:0}
.card-title{font-family:var(--fd);font-size:0.9rem;font-weight:700;line-height:1.2;margin-bottom:3px}
.card-stats{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.tag{font-size:0.62rem;letter-spacing:0.04em;text-transform:uppercase;padding:2px 6px;font-weight:600;border-radius:2px}
.tag-p{background:rgba(90,138,90,0.15);color:var(--forest)}
.tag-t{background:rgba(201,162,77,0.12);color:rgba(201,162,77,0.7)}
.tag-w{background:rgba(224,216,204,0.06);color:var(--txd)}
.card-vibe{font-size:0.76rem;color:var(--txm);line-height:1.45;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-mechs{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.mech{font-size:0.56rem;letter-spacing:0.03em;text-transform:uppercase;padding:1px 5px;border:1px solid var(--bordlt);color:var(--txd);border-radius:2px;font-weight:500}

.empty{grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--txd)}
.empty h3{font-family:var(--fd);font-size:1.2rem;margin-bottom:6px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(10,8,5,0.75);backdrop-filter:blur(3px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity 0.2s}
.overlay.on{opacity:1}
.modal{background:var(--bg2);border:1px solid rgba(224,216,204,0.15);max-width:540px;width:100%;max-height:85vh;overflow-y:auto;padding:28px;position:relative;transform:translateY(8px);transition:transform 0.2s;border-radius:6px}
.overlay.on .modal{transform:translateY(0)}
.modal-x{position:absolute;top:10px;right:12px;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--txd);padding:4px 8px;z-index:5}
.modal-x:hover{color:var(--tx)}
.modal-top{display:flex;gap:16px;margin-bottom:16px}
.modal-thumb{flex-shrink:0;width:88px;height:88px;overflow:hidden;border-radius:3px;position:relative;background:rgba(224,216,204,0.06)}
.modal-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.modal-thumb .av{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2.2rem}
.modal-thumb img.ld+.av{display:none}
.modal-info h2{font-family:var(--fd);font-size:1.25rem;font-weight:800;line-height:1.2;margin-bottom:8px}
.modal-stats{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.modal-stats .tag{font-size:0.72rem;padding:3px 8px}
.modal-shelf{font-size:0.7rem;color:var(--txd);font-style:italic}
.modal-section{margin-bottom:14px}
.modal-section h3{font-family:var(--fd);font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--txd);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--bordlt)}
.modal-vibe{font-size:0.88rem;color:var(--txm);line-height:1.6}
.modal-mechs{display:flex;flex-wrap:wrap;gap:5px}
.modal-mechs .mech{font-size:0.7rem;padding:3px 8px;background:rgba(224,216,204,0.06);border:1px solid var(--border)}
.modal-moods{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:0.62rem;letter-spacing:0.04em;text-transform:uppercase;padding:3px 9px;border-radius:20px;font-weight:600}
.chip-party{background:rgba(199,90,48,0.15);color:#e07050}
.chip-euro{background:rgba(90,138,90,0.15);color:#7ab07a}
.chip-mid{background:rgba(90,120,160,0.15);color:#8ab0d0}
.chip-epic{background:rgba(140,80,170,0.15);color:#b88ae0}
.chip-family{background:rgba(60,140,80,0.15);color:#60c080}
.chip-solo{background:rgba(140,120,60,0.15);color:#c0a850}
.likedis{margin-top:4px}
.likedis .ld-title{font-size:0.76rem;font-weight:700;margin-bottom:4px;color:var(--txm)}
.likedis .ld-title.like{color:#7ab07a}
.likedis .ld-title.dislike{color:#d08070}
.likedis ul{margin:0 0 10px 16px;padding:0}
.likedis li{font-size:0.82rem;color:var(--txm);line-height:1.5;margin-bottom:2px}
.bgg-btn{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:var(--bg);padding:11px 24px;font-family:var(--fb);font-size:0.85rem;font-weight:700;letter-spacing:0.03em;text-decoration:none;transition:background 0.15s;margin-top:6px;border-radius:4px}
.bgg-btn:hover{background:#d4ad58}

/* Compare panel */
.cpanel{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid rgba(224,216,204,0.15);box-shadow:0 -8px 30px rgba(0,0,0,0.5);z-index:100;transform:translateY(100%);transition:transform 0.3s;padding:14px 20px;max-height:50vh;overflow-y:auto}
.cpanel.show{transform:translateY(0)}
.cphdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cphdr h3{font-family:var(--fd);font-size:0.95rem;font-weight:700}
.cpclear{font-size:0.7rem;color:var(--txd);cursor:pointer;background:none;border:1px solid var(--border);padding:4px 10px;font-family:var(--fb);border-radius:4px}
.cpanel table{width:100%;border-collapse:collapse;table-layout:fixed}
.cpanel th,.cpanel td{padding:5px 6px;text-align:left;vertical-align:top;border-bottom:1px solid var(--bordlt)}
.cpanel th{font-size:0.62rem;color:var(--txd);text-transform:uppercase;letter-spacing:0.05em;font-weight:600;width:70px}
.cpanel td{font-size:0.76rem;color:var(--tx)}
.cpname{font-family:var(--fd);font-size:0.82rem;font-weight:700;line-height:1.2;margin-bottom:2px}
.cpvibe{font-size:0.68rem;color:var(--txd);line-height:1.3;font-style:italic}
.cpbgg{display:inline-block;padding:4px 10px;font-size:0.7rem;font-weight:600;color:var(--gold);text-decoration:none;background:rgba(201,162,77,0.1);border:1px solid rgba(201,162,77,0.3);border-radius:3px}
.wbar{display:inline-block;height:5px;border-radius:3px;vertical-align:middle;margin-left:4px}

.card .cf{position:absolute;top:5px;right:5px;width:22px;height:22px;display:none;align-items:center;justify-content:center;font-size:11px;cursor:pointer;z-index:5;background:var(--card);border:1px solid var(--border);border-radius:3px;transition:all 0.12s}
.card .cf.sel{display:flex!important;background:rgba(138,154,170,0.3);border-color:var(--slate)}
.card:hover .cf{display:flex}

.legend{margin-top:36px;padding-top:16px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:14px;font-size:0.7rem;color:var(--txd);align-items:center}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-bar{width:10px;height:10px;flex-shrink:0;border-radius:2px}

@media(max-width:600px){
  header{flex-direction:column;align-items:flex-start}
  .grid{grid-template-columns:1fr}
  .si{width:100%}
  .shelf-desc{display:none}
  .modal{padding:20px}
  .cpanel{max-height:60vh}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="hl">
      <h1>Blake's <span>Game Shelf</span></h1>
      <p>Browse · Filter · Pick something to play</p>
    </div>
    <div class="badge"><span id="total">0</span><small>games owned</small></div>
  </header>
  <div class="fbar" id="filters"></div>
  <div class="status" id="status"></div>
  <div id="shelves"></div>
  <div class="legend">
    <strong style="font-size:.7rem;color:var(--tx)">Weight:</strong>
    <div class="legend-item"><div class="legend-bar" style="background:var(--rust)"></div>Heavy</div>
    <div class="legend-item"><div class="legend-bar" style="background:var(--gold)"></div>Med-Heavy</div>
    <div class="legend-item"><div class="legend-bar" style="background:var(--forest)"></div>Medium</div>
    <div class="legend-item"><div class="legend-bar" style="background:#5a9e7a"></div>Med-Light</div>
    <div class="legend-item"><div class="legend-bar" style="background:#9e9a5e"></div>Light</div>
  </div>
</div>
<div class="cpanel" id="cpanel"></div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-x" onclick="closeModal()">✕</button>
    <div class="modal-top">
      <div class="modal-thumb" id="m-thumb">
        <img id="m-img" src="" alt="" onload="this.classList.add('ld')">
        <div class="av" id="m-av"></div>
      </div>
      <div class="modal-info">
        <h2 id="m-title"></h2>
        <div class="modal-stats" id="m-stats"></div>
        <div class="modal-shelf" id="m-shelf"></div>
      </div>
    </div>
    <div class="modal-section"><h3>About This Game</h3><div class="modal-vibe" id="m-vibe"></div></div>
    <div class="modal-section" id="m-ld-section"></div>
    <div class="modal-section"><h3>Mechanics</h3><div class="modal-mechs" id="m-mechs"></div></div>
    <div class="modal-section"><h3>Vibes</h3><div class="modal-moods" id="m-moods"></div></div>
    <a class="bgg-btn" id="m-btn" href="#" target="_blank" rel="noopener">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Open on BoardGameGeek
    </a>
  </div>
</div>

<script>
const BGG_API_TOKEN = "";
const ML={ENG:"Engine Building",WP:"Worker Placement",AC:"Area Control",DR:"Drafting",CO:"Co-op",BL:"Bluffing",PL:"Push Your Luck",TL:"Tile Laying",DX:"Dexterity",RC:"Racing",AU:"Auction",TK:"Trick-Taking",AB:"Abstract",AS:"Asymmetric"};
const MOODS={party:"Party",euro:"Thinky Euro",mid:"Mid-Weight",epic:"Epic",family:"Family",solo:"Solo"};
function wCat(w){return w>=3.5?5:w>=2.8?4:w>=2.1?3:w>=1.5?2:1;}
const WLABELS={5:"Heavy",4:"Med-Heavy",3:"Medium",2:"Med-Light",1:"Light"};
function maxTime(t){const n=t.match(/\d+/g);return n?Math.max(...n.map(Number)):30;}
function timeGroup(t){const m=maxTime(t);return m<=20?"quick":m<=45?"short":m<=90?"medium":"long";}

const G=[
// ── EPIC STRATEGY ─────────────────────────────────────────────────
{n:"Food Chain Magnate",p:"2-5",t:"120-240",shelf:"epic",i:"🍔",bgg:175914,pn:2,px:5,w:4.21,
 v:"Build a fast-food empire from scratch — hire staff, set prices, run ad campaigns, and ruthlessly undercut your rivals. No luck, no safety net. Every decision is permanent and every mistake is yours. The most punishing economic game ever made, and people keep coming back for more.",
 m:["ENG","AC"],md:["epic","euro"],
 pro:["You love zero-luck games where the better player wins every time","You want an economic sandbox with unlimited strategic depth","You enjoy cutthroat competition where nothing is forgiven"],
 con:["You can fall behind early and spend 3 hours losing slowly","The learning curve is brutal — expect to get crushed your first few games","Games run 3-4 hours and demand full attention the entire time"]},
{n:"Spirit Island",p:"1-4",t:"90-120",shelf:"epic",i:"🌿",bgg:162886,pn:1,px:4,w:4.06,
 v:"Play as elemental spirits defending your island from colonizers. Each spirit has wildly different powers, and you'll need to coordinate devastating combos to push the invaders back. A cooperative brain-burner that makes you feel genuinely powerful once it clicks.",
 m:["CO","AS"],md:["epic","solo"],
 pro:["You want a co-op that treats you like an adult and never holds your hand","You love discovering combos between wildly asymmetric characters","You enjoy solo gaming — this is one of the best solo experiences in the hobby"],
 con:["Analysis paralysis hits hard, especially with 4 players","Setup and rules overhead is significant — not a quick teach","The anti-colonial theme, while well-handled, isn't for every group"]},
{n:"Brass: Birmingham",p:"3-4",t:"60-120",shelf:"epic",i:"🏭",bgg:224517,pn:3,px:4,w:3.93,
 v:"Build canals and railways across industrial England, connecting cotton mills, iron works, and breweries into an economic network. Two distinct eras mean the whole board resets halfway through. Deeply interlocking systems that reward long-term planning.",
 m:["ENG","AC"],md:["epic","euro"],
 pro:["You love tightly designed economic systems where everything connects","The two-era structure creates a unique mid-game pivot point","Consistently rated #1 on BGG for a reason — the depth is extraordinary"],
 con:["Only plays 3-4, and really shines at 3-4 specifically","The card system can feel limiting when you can't build where you want","First game is rough — you won't understand the strategy until round 2 of your second play"]},
{n:"Great Western Trail",p:"1-4",t:"75-150",shelf:"epic",i:"🤠",bgg:341169,pn:1,px:4,w:3.71,
 v:"Drive cattle to Kansas City, improving your deck and building along the trail. Every trip you upgrade your cowboys, craftsmen, and engineers to make the next delivery more lucrative. A beautifully layered euro that unfolds more each play.",
 m:["ENG"],md:["epic","euro","solo"],
 pro:["Multiple viable strategies keep it fresh game after game","The deck-thinning mechanic is incredibly satisfying as your herd improves","Excellent solo mode with the 2nd edition"],
 con:["The teach takes a while — lots of interlocking systems to explain","Can feel like multiplayer solitaire with minimal direct interaction","Visual design is busy and hard to parse at first glance"]},
{n:"Star Wars: Rebellion",p:"2-4",t:"180-240",shelf:"epic",i:"⚔️",bgg:187645,pn:2,px:4,w:3.65,
 v:"One player controls the Galactic Empire hunting for the hidden rebel base. The other is the Rebellion, stalling for time and inspiring hope across the galaxy. An epic cat-and-mouse that genuinely feels like the original trilogy.",
 m:["AC","AS"],md:["epic"],
 pro:["The most thematic Star Wars experience in any medium — you'll get chills","Asymmetric gameplay is perfectly balanced between Empire and Rebellion","Diplomatic missions create incredible narrative moments"],
 con:["3-4 hour commitment minimum, and it's really a 2-player game","The combat system is clunky and luck-dependent compared to the rest","You need a partner equally willing to commit to learning both sides"]},
{n:"Root",p:"2-4",t:"60-90",shelf:"epic",i:"🦊",bgg:237182,pn:2,px:4,w:3.62,
 v:"A woodland war game where every faction plays by completely different rules. The Cats build an engine, the Birds follow a decree, the Alliance hides in the forest, and the Vagabond plays everyone. Endlessly replayable and unlike anything else.",
 m:["AC","AS"],md:["epic","mid"],
 pro:["Every faction feels like playing a completely different game","The cute art hides one of the most aggressive games in the hobby","Once everyone knows their faction, games fly by in 60-90 minutes"],
 con:["Everyone needs to understand ALL factions to play well, not just their own","Balance issues when mixing experienced and new players at the same table","The Vagabond can feel like they're playing a different game entirely"]},
{n:"Arcs",p:"2-4",t:"90-120",shelf:"epic",i:"🚀",bgg:358553,pn:2,px:4,w:3.57,
 v:"A card-driven space opera where you lead a faction vying for galactic influence. The trick-taking card play forces painful choices every round, and the optional campaign layer adds persistent consequences across sessions.",
 m:["AC","AS"],md:["epic"],
 pro:["Cole Wehrle's best card system — every hand is a painful puzzle","The campaign mode adds a legacy-like arc without destroying components","Packs a heavy-game feeling into a surprisingly tight 2-hour window"],
 con:["Very aggressive — if you don't like direct conflict, this isn't for you","The base game without campaign can feel like an appetizer","Requires exactly the right group who enjoy political card play"]},
{n:"Clans of Caledonia",p:"1-4",t:"90-120",shelf:"epic",i:"🏴",bgg:216132,pn:1,px:4,w:3.55,
 v:"Lead a Scottish clan through the industrial age — produce whisky, trade goods, export cattle, and expand your territory on a shared market. The dynamic pricing system means every move ripples across the table.",
 m:["ENG","AC"],md:["epic","euro","solo"],
 pro:["The dynamic market creates genuine interaction in an otherwise euro-style game","Variable clan powers give each player a unique economic angle","Excellent solo mode and great at 2 players"],

const SHELVES=[

  {id:"gate",name:"Gateway & Family",desc:"Accessible crowd-pleasers for any group"},

const WEIGHT_GROUPS=[
  {id:5,name:"Heavy",desc:"Plan your evening around these"},
  {id:4,name:"Medium-Heavy",desc:"Meaty but manageable"},
  {id:3,name:"Medium",desc:"The sweet spot for most game nights"},
  {id:2,name:"Medium-Light",desc:"Easy to teach, satisfying to play"},
  {id:1,name:"Light",desc:"Grab-and-go with zero rules overhead"},
];

  {id:"epic",name:"Epic",desc:"Big commitment, big payoff"},
  {id:"euro",name:"Thinky Euro",desc:"Elegant systems and economic puzzles"},
  {id:"mid",name:"Mid-Weight",desc:"Accessible strategy with real depth"},

  {id:"family",name:"Family",desc:"Works for all ages and experience levels"},
  {id:"solo",name:"Solo",desc:"Excellent alone"},
];
const TIME_GROUPS=[
  {id:"quick",name:"Quick Games",desc:"20 minutes or less",max:20},
  {id:"short",name:"Short Games",desc:"Under 45 minutes",max:45},
  {id:"medium",name:"Medium Games",desc:"45-90 minutes",max:90},
  {id:"long",name:"Long Games",desc:"90+ minute commitment",max:999},

const PF=[
  {l:"Any #",f:()=>true},
  {l:"Solo",f:g=>g.pn<=1},
  {l:"2p",f:g=>g.pn<=2&&g.px>=2},
  {l:"2p Only",f:g=>g.pn===2&&g.px===2},
  {l:"3-4",f:g=>g.pn<=3&&g.px>=3},
  {l:"5+",f:g=>g.px>=5},
];

const GROUPS=[
  {l:"Shelf",id:"shelf"},
  {l:"Weight",id:"weight"},
  {l:"Mood",id:"mood"},
  {l:"Play Time",id:"time"},
];
const SORTS=[
  {l:"Lightest first",f:(a,b)=>a.w-b.w},
  {l:"Heaviest first",f:(a,b)=>b.w-a.w},
  {l:"A → Z",f:(a,b)=>a.n.localeCompare(b.n)},
];

let S={q:"",pf:0,mood:null,cmp:[],sort:0,group:0};
const imgCache={};

function avColor(str){
  const pal=['#9e4e28','#b87820','#2d5a2d','#4a6080','#6a3080','#5a5020','#357060','#705030'];
  let h=0;for(let i=0;i<str.length;i++)h=(str.charCodeAt(i)+((h<<5)-h))|0;
  return pal[Math.abs(h)%pal.length];
}

async function fetchImages(){
  try{const c=localStorage.getItem("bgs_v8");if(c){const p=JSON.parse(c);if(p&&Object.keys(p).length>20){Object.assign(imgCache,p);updateThumbsInPlace();refreshImages(p);return;}}}catch(e){}
  await refreshImages({});
}
async function refreshImages(ex){
  const ids=G.map(g=>g.bgg),bs=20,all={...ex};
  for(let i=0;i<ids.length;i+=bs){
    const batch=ids.slice(i,i+bs);
    try{
      const url=`https://boardgamegeek.com/xmlapi2/thing?id=${batch.join(",")}`;
      const opts={};
      if(BGG_API_TOKEN)opts.headers={"Authorization":"Bearer "+BGG_API_TOKEN};
      let r=await fetch(url,opts);
      if(r.status===202){await new Promise(r=>setTimeout(r,3000));r=await fetch(url,opts);}
      if(r.ok){
        const xml=new DOMParser().parseFromString(await r.text(),"text/xml");
        xml.querySelectorAll("item").forEach(it=>{
          const id=parseInt(it.getAttribute("id")),im=it.querySelector("image"),th=it.querySelector("thumbnail");
          const u=(im&&im.textContent)||(th&&th.textContent);
          if(u&&id){all[id]=u.trim().replace(/^\/\//,"https://");imgCache[id]=all[id];}
        });
      }
    }catch(e){}
    updateThumbsInPlace();
    await new Promise(r=>setTimeout(r,1500));
  }
  try{localStorage.setItem("bgs_v8",JSON.stringify(all));}catch(e){}
  updateThumbsInPlace();
}
function updateThumbsInPlace(){
  document.querySelectorAll('.card-thumb[data-id]').forEach(el=>{
    const src=imgCache[el.dataset.id];
    if(src){const img=el.querySelector('img');if(img&&!img.classList.contains('ld')){img.src=src;img.style.display='';}}
  });
}

function getFiltered(){
  let r=[...G];
  const pf=PF[S.pf];if(pf&&S.pf>0)r=r.filter(pf.f);
  if(S.mood)r=r.filter(g=>g.md.includes(S.mood));
  if(S.q){const s=S.q.toLowerCase();r=r.filter(x=>x.n.toLowerCase().includes(s)||x.v.toLowerCase().includes(s)||x.m.some(m=>ML[m].toLowerCase().includes(s)));}
  return r;
}

function renderFilters(){
  document.getElementById("filters").innerHTML=`
    <div class="frow">
      <input class="si" id="sb" type="text" placeholder="Search games, vibes, mechanics..." autocomplete="off" value="${S.q.replace(/"/g,'&quot;')}">
      <span class="flbl">Players</span>
      ${PF.map((f,i)=>`<button class="pill${S.pf===i?' on':''}" onclick="setPF(${i})">${f.l}</button>`).join("")}
    </div>
    <div class="frow">
      <span class="flbl">Mood</span>
      ${Object.keys(MOODS).map(k=>`<button class="pill pm-${k}${S.mood===k?' on':''}" onclick="setMood('${k}')">${MOODS[k]}</button>`).join("")}
      ${S.mood?`<button class="pc" onclick="setMood(null)">✕</button>`:""}
    </div>
    <div class="frow">
      <span class="flbl">Group by</span>
      ${GROUPS.map((g,i)=>`<button class="pill${S.group===i?' on':''}" onclick="setGroup(${i})">${g.l}</button>`).join("")}
      <span style="flex:1"></span>
      <span class="flbl">Sort</span>
      ${SORTS.map((s,i)=>`<button class="pill${S.sort===i?' on':''}" onclick="setSort(${i})" style="font-size:0.68rem">${s.l}</button>`).join("")}
    </div>`;
  document.getElementById("sb").addEventListener("input",function(e){S.q=e.target.value;renderShelves();});
}

function getGroups(list){
  const gid=GROUPS[S.group].id;
  if(gid==="shelf"){
    return SHELVES.map(s=>({name:s.name,desc:s.desc,games:list.filter(g=>g.shelf===s.id)})).filter(s=>s.games.length);
  }
  if(gid==="weight"){
    return WEIGHT_GROUPS.map(w=>({name:w.name,desc:w.desc,games:list.filter(g=>wCat(g.w)===w.id)})).filter(s=>s.games.length);
  }
  if(gid==="mood"){
    return MOOD_GROUPS.map(m=>({name:m.name,desc:m.desc,games:list.filter(g=>g.md.includes(m.id))})).filter(s=>s.games.length);
  }
  if(gid==="time"){
    return TIME_GROUPS.map(t=>({name:t.name,desc:t.desc,games:list.filter(g=>timeGroup(g.t)===t.id)})).filter(s=>s.games.length);
  }
  return [{name:"All Games",desc:"",games:list}];
}

function renderShelves(){
  const list=getFiltered();
  const container=document.getElementById("shelves");
  const st=document.getElementById("status");
  st.textContent=list.length===G.length?`Showing all ${G.length} games`:`Showing ${list.length} of ${G.length} games`;

  if(!list.length){
    container.innerHTML='<div class="empty"><h3>No games found</h3><p>Try adjusting your filters</p></div>';
    renderCompare();return;
  }

  const groups=getGroups(list);
  const sortFn=SORTS[S.sort].f;
  let html='';
  groups.forEach(grp=>{
    const sorted=[...grp.games].sort(sortFn);
    html+=`<div class="shelf">
      <div class="shelf-hdr">
        <div class="shelf-title">${grp.name}</div>
        <div class="shelf-count">${sorted.length} game${sorted.length!==1?'s':''}</div>
        ${grp.desc?`<div class="shelf-desc">${grp.desc}</div>`:''}
      </div>
      <div class="grid">${sorted.map(g=>cardHTML(g)).join("")}</div>
    </div>`;
  });
  container.innerHTML=html;
  attachCardListeners();renderCompare();
}

function cardHTML(g){
  const wc=wCat(g.w);const color=avColor(g.n);const cached=imgCache[g.bgg];const isCmp=S.cmp.includes(g.bgg);
  return`<div class="card${isCmp?' cmp':''}" data-wc="${wc}" data-bgg="${g.bgg}">
    <div class="card-thumb" data-id="${g.bgg}">
      <img src="${cached||''}" alt="${g.n}" onload="this.classList.add('ld')" onerror="this.style.display='none'" ${cached?'':'style="display:none"'}>
      <div class="av" style="background:${color}">${g.i}</div>
    </div>
    <div class="card-body">
      <div class="card-title">${g.n}</div>
      <div class="card-stats">
        <span class="tag tag-p">👥 ${g.p}</span>
        <span class="tag tag-t">⏱ ${g.t}m</span>
        <span class="tag tag-w">${WLABELS[wc]} · ${g.w.toFixed(1)}</span>
      </div>
      <div class="card-vibe">${g.v}</div>
      <div class="card-mechs">${g.m.map(m=>`<span class="mech">${ML[m]}</span>`).join("")}</div>
    </div>
    <div class="cf${isCmp?' sel':''}" data-cmp="${g.bgg}" title="Compare">${isCmp?'⚖️':'➕'}</div>
  </div>`;
}

function attachCardListeners(){
  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click',function(e){
      if(e.target.closest('.cf'))return;
      const bgg=parseInt(this.dataset.bgg);const g=G.find(x=>x.bgg===bgg);if(g)openModal(g);
    });
  });
  document.querySelectorAll('.cf').forEach(btn=>{
    btn.addEventListener('click',function(e){e.stopPropagation();toggleCmp(parseInt(this.dataset.cmp));});
  });
}

function openModal(g){
  const color=avColor(g.n);const wc=wCat(g.w);const shelf=SHELVES.find(s=>s.id===g.shelf);
  const img=document.getElementById('m-img');img.classList.remove('ld');
  const cached=imgCache[g.bgg];
  if(cached){img.src=cached;img.style.display='';}else{img.src='';img.style.display='none';}
  document.getElementById('m-av').textContent=g.i;document.getElementById('m-av').style.background=color;
  document.getElementById('m-title').textContent=g.n;
  document.getElementById('m-stats').innerHTML=`
    <span class="tag tag-p">👥 ${g.p} players</span>
    <span class="tag tag-t">⏱ ${g.t} min</span>
    <span class="tag tag-w">${WLABELS[wc]} · ${g.w.toFixed(2)}</span>`;
  document.getElementById('m-shelf').textContent=shelf?`📚 ${shelf.name}`:'';
  document.getElementById('m-vibe').textContent=g.v;
  // Like / Dislike
  let ldHTML='<h3>What Players Say</h3><div class="likedis">';
  if(g.pro&&g.pro.length){
    ldHTML+=`<div class="ld-title like">👍 You might like this game if...</div><ul>${g.pro.map(p=>`<li>${p}</li>`).join('')}</ul>`;
  }
  if(g.con&&g.con.length){
    ldHTML+=`<div class="ld-title dislike">👎 You might not like this game if...</div><ul>${g.con.map(c=>`<li>${c}</li>`).join('')}</ul>`;
  }
  ldHTML+='</div>';
  document.getElementById('m-ld-section').innerHTML=ldHTML;
  document.getElementById('m-mechs').innerHTML=g.m.map(m=>`<span class="mech">${ML[m]}</span>`).join('');
  document.getElementById('m-moods').innerHTML=g.md.map(m=>`<span class="chip chip-${m}">${MOODS[m]||m}</span>`).join('');
  document.getElementById('m-btn').href=`https://boardgamegeek.com/boardgame/${g.bgg}`;
  const ov=document.getElementById('overlay');ov.style.display='flex';
  requestAnimationFrame(()=>ov.classList.add('on'));
}

function closeModal(){const ov=document.getElementById('overlay');ov.classList.remove('on');setTimeout(()=>{ov.style.display='none';},200);}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function toggleCmp(bgg){
  if(S.cmp.includes(bgg))S.cmp=S.cmp.filter(x=>x!==bgg);
  else if(S.cmp.length<3)S.cmp.push(bgg);
  renderShelves();
}
function clearCmp(){S.cmp=[];renderShelves();}

function renderCompare(){
  const panel=document.getElementById("cpanel");
  if(S.cmp.length===0){panel.classList.remove("show");panel.innerHTML="";document.querySelector('.wrap').style.paddingBottom='80px';return;}
  const games=S.cmp.map(id=>G.find(g=>g.bgg===id)).filter(Boolean);
  function wBar(w){const pct=((w-1)/4)*100;const clr=w<1.5?'#5a6e8c':w<2.5?'#5a9e7a':w<3.5?'var(--gold)':'var(--rust)';return`${w.toFixed(1)} <span class="wbar" style="width:${Math.max(pct,8)}px;background:${clr}"></span>`;}
  function tr(lbl,fn){return`<tr><th>${lbl}</th>${games.map(g=>`<td>${fn(g)}</td>`).join("")}</tr>`;}
  panel.innerHTML=`
    <div class="cphdr"><h3>Compare ${games.length} game${games.length>1?'s':''}</h3><button class="cpclear" onclick="clearCmp()">✕ Clear</button></div>
    <table>
      <tr><th></th>${games.map(g=>`<td><div class="cpname">${g.n}</div><div class="cpvibe">${g.v.slice(0,80)}...</div></td>`).join("")}</tr>
      ${tr("Players",g=>g.p)}
      ${tr("Time",g=>g.t+"m")}
      ${tr("Weight",g=>wBar(g.w))}
      ${tr("Mechanics",g=>g.m.map(m=>ML[m]).join(", "))}
      ${tr("Mood",g=>g.md.map(d=>MOODS[d]||d).join(", "))}
      ${tr("Shelf",g=>{const s=SHELVES.find(c=>c.id===g.shelf);return s?s.name:g.shelf;})}
      <tr><th></th>${games.map(g=>`<td><a class="cpbgg" href="https://boardgamegeek.com/boardgame/${g.bgg}" target="_blank">BGG ↗</a></td>`).join("")}</tr>
    </table>`;
  panel.classList.add("show");
  document.querySelector('.wrap').style.paddingBottom=(panel.offsetHeight+20)+'px';
}

function setPF(i){S.pf=i;renderFilters();renderShelves();}
function setMood(m){S.mood=S.mood===m?null:m;renderFilters();renderShelves();}
function setGroup(i){S.group=i;renderFilters();renderShelves();}
function setSort(i){S.sort=i;renderFilters();renderShelves();}

document.getElementById("total").textContent=G.length;
renderFilters();renderShelves();fetchImages();
</script>
</body>
</html>
